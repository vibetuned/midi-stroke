id: harmonic-scale-writing-s2-n6
type: harmonic-scale-writing
title: Write the harmonic minor scales
instructions: 'The tonic is given. Write the harmonic minor scale, one octave ascending:
  the third and sixth degrees a half step lower than the major, the seventh raised
  — leaving the step and a half between six and seven that gives the scale its colour.'

title: Minor scales in their three forms
instructions: The tonic is given; write each form one octave up. The natural form
  is the signature alone; the harmonic raises the seventh (leaving the step and a
  half from six to seven); the melodic ascent raises six and seven both. Every raised
  tone is written as an accidental — the signature never changes.

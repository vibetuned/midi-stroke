id: cadence-naming-s1-n4
type: cadence-naming
title: Name the cadences
instructions: 'Each pair of chords closes a phrase, taken from the book''s own figures.
  Name the cadence before you play it: authentic (V to I), plagal (IV to I), half
  (the phrase rests on V), or deceptive (V turns aside, most often to vi).'
key: C
seed: 1
params:
  items: 4
  picks:
  - - fig71
    - deceptive cadence (V to vi)
  - - fig68
    - authentic cadence (V to I)
  - - fig70
    - half-cadence (phrase ends on V)
  - - fig69
    - plagal cadence (IV to I)
sources:
- work: Gehrkens, Music Notation and Terminology (A. S. Barnes, 1914)
  pages: 87-94
  url: https://archive.org/details/musicnotationter00gehr
  note: Chords and cadences, ch. XVIII, figs. 68-71

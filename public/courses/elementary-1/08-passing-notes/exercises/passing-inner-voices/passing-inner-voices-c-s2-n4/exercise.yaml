id: passing-inner-voices-c-s2-n4
type: passing-inner-voices
title: Add the inner parts under a moving soprano in C major
instructions: Soprano and bass are given; the unaccented soprano note approached and
  quitted by step is a passing note — no chord of its own. Add alto and tenor as whole
  notes beneath the moving line, all the usual rules holding.
key: C
seed: 2
params:
  items: 4
  plans:
  - - - 1
      - 5
    - F5
  - - - 2
      - 5
    - E5
  - - - 4
      - 1
    - D5
  - - - 4
      - 1
    - D5
sources:
- work: Kitson, Elementary Harmony, Part I (Oxford University Press, 1920)
  pages: 60-67
  url: https://archive.org/details/elementaryharmon01kits
  note: Unaccented diatonic passing notes — adding parts

id: passing-rewrite-g-s1-n4
type: passing-rewrite
title: Add the passing notes in G major
instructions: Each pair of chords is given complete; the soprano moves by a third.
  Re-write the passage, filling the third with an unaccented diatonic passing note
  on the weak half of the measure. A passing note is approached and quitted by step
  in one direction, never makes an augmented second, and must not produce consecutive
  fifths.
key: G
seed: 1
params:
  items: 4
  plans:
  - - - 2
      - 5
    - B4
  - - - 6
      - 5
    - C5
  - - - 6
      - 5
    - C5
  - - - 1
      - 4
    - F#5
sources:
- work: Kitson, Elementary Harmony, Part I (Oxford University Press, 1920)
  pages: 60-67
  url: https://archive.org/details/elementaryharmon01kits
  note: Unaccented diatonic passing notes

id: accented-passing-c-s2-n4
type: accented-passing
title: Accented passing notes in C major
instructions: The soprano falls a third between the chords. Re-write each pair, striking
  the intermediate note WITH the second chord — on the strong half — and resolving
  it down by step. Never strike the discord against its own resolution note unless
  that note lies in the bass.
key: C
seed: 2
params:
  items: 4
  plans:
  - - - 1
      - 4
    - D5
  - - - 4
      - 5
    - E4
  - - - 6
      - - 2
        - '6'
    - B4
  - - - 1
      - - 2
        - '6'
    - B4
sources:
- work: Kitson, Elementary Harmony, Part I (Oxford University Press, 1920)
  pages: 82-85
  url: https://archive.org/details/elementaryharmon01kits
  note: Accented passing notes, ch. XI

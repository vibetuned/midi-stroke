id: interval-spelling-c-s2-n6
type: interval-spelling
title: Intervals between the degrees of C major
instructions: Each pair names two degrees of the scale; the first note is given. Write
  the second note, reckoning the interval upwards, and name its number and quality
  (e.g. minor third) before you play it. All intervals lie within one octave.
key: C
seed: 2
params:
  items: 6
  pairs:
  - - 7
    - 8
  - - 1
    - 3
  - - 1
    - 4
  - - 6
    - 7
  - - 2
    - 7
  - - 1
    - 7
  intervals:
  - minor second
  - major third
  - perfect fourth
  - major second
  - major sixth
  - major seventh
sources:
- work: Kitson, Elementary Harmony, Part I (Oxford University Press, 1920)
  pages: 7-11
  url: https://archive.org/details/elementaryharmon01kits
  note: Ear-training in the diatonic major scale, §§2-7

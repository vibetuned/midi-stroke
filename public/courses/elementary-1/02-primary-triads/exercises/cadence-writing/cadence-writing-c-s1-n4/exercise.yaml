type: cadence-writing
title: Write the cadences in C major
instructions: 'Write each named cadence for four voices, root position, the final
  chord on the strong accent: perfect V–I, plagal IV–I, imperfect (half-close) ending
  on V. All the connection rules hold; the leading note rises at the perfect cadence.'

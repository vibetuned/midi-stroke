id: primary-arrangement-c-s2-n4
type: primary-arrangement
title: Arrange the primary triads in C major
instructions: 'The bass note (the root) is given twice for each chord. Add soprano,
  alto, and tenor, making two different arrangements: complete chord, root or fifth
  doubled — not the major third, never the leading note. Keep adjacent upper parts
  within an octave. (The book labels root position Ia, IVa, Va; we write I, IV, V.)'
key: C
seed: 2
params:
  items: 4
  degrees:
  - 1
  - 1
  - 1
  - 4
sources:
- work: Kitson, Elementary Harmony, Part I (Oxford University Press, 1920)
  pages: 15-18
  url: https://archive.org/details/elementaryharmon01kits
  note: Primary triads arranged for four voices, §§4-8

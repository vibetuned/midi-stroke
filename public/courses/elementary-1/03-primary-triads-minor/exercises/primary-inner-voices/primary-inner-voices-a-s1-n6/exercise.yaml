id: primary-inner-voices-a-s1-n6
type: primary-inner-voices
title: Add the inner parts in A minor
instructions: Soprano and bass are given; add alto and tenor, forming primary triads
  in root position. Keep the common tone in the same part, move to the nearest note,
  no consecutive fifths or octaves, and let the leading note rise.

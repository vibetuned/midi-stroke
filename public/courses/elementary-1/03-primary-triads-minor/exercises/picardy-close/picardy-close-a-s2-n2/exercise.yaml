id: picardy-close-a-s2-n2
type: picardy-close
title: The Tierce de Picardie in A minor
instructions: Write each close for four voices, sharpening the third of the final
  tonic chord (Tierce de Picardie) — the phrase ends major in a minor key. Watch the
  leading note (it still rises) and never move by an augmented second.

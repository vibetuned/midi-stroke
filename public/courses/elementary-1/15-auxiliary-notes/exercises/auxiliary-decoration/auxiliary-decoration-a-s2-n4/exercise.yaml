id: auxiliary-decoration-a-s2-n4
type: auxiliary-decoration
title: Auxiliary notes in A minor
instructions: Re-write each chord, letting the soprano leave its tone by step and
  return to it. Upper auxiliaries are diatonic; lower ones lie a semitone below a
  root or fifth, a tone or semitone below a third. The harmony holds beneath the ornament.
key: a
seed: 2
params:
  items: 4
  plans:
  - - i
    - upper
    - D5
  - - i
    - lower
    - B4
  - - iv
    - upper
    - G5
  - - i
    - lower
    - D4
sources:
- work: Kitson, Elementary Harmony, Part I (Oxford University Press, 1920)
  pages: 101-105
  url: https://archive.org/details/elementaryharmon01kits
  note: Auxiliary notes, ch. XV

id: close-approach-c-s1-n3
type: close-approach
title: Approaching the closes in C minor
instructions: Write each three-chord formula for four voices. At the false close (V
  to VI) the leading note rises and the third of VI is doubled; avoid IIa to Ia everywhere;
  upper parts against the bass wherever the roots move by step.
key: c
seed: 1
params:
  items: 3
  picks:
  - - half close
    - - 1
      - 6
      - 5
  - - full close
    - - 4
      - 5
      - 1
  - - false close
    - - 4
      - 5
      - 6
sources:
- work: Kitson, Elementary Harmony, Part I (Oxford University Press, 1920)
  pages: 31-37
  url: https://archive.org/details/elementaryharmon01kits
  note: Approaches to the closes, ch. IV §§7-9, 16-18

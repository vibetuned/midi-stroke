id: figured-phrase-a-s2-n2
type: figured-phrase
title: Root positions and first inversions in A minor
instructions: Soprano and bass are given; add alto and tenor. A label with 6 marks
  a first inversion — the bass carries the chord's third. Doubling follows the root-position
  principle; never VIIb to Va; watch the fifths where VIIb is involved.
key: a
seed: 2
params:
  items: 2
  plans:
  - - 1
    - - 1
      - '6'
    - 4
    - - 2
      - '6'
    - 5
    - 1
  - - 1
    - - 7
      - '6'
    - - 1
      - '6'
    - 4
    - 5
    - 1
sources:
- work: Kitson, Elementary Harmony, Part I (Oxford University Press, 1920)
  pages: 43-47
  url: https://archive.org/details/elementaryharmon01kits
  note: Uses of the first inversions, ch. V §§6-17

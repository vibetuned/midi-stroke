id: mediant-uses-c-s2-n4
type: mediant-uses
title: The mediant triad in C major
instructions: Write each cell. In root position the mediant keeps a common tone with
  both neighbours — except falling to IV under the descending scale. As iii6 it may
  stand wherever the dominant could, provided the sixth above the bass falls a step
  or a third.
key: C
seed: 2
params:
  items: 4
  picks:
  - - descending scale
    - - 1
      - 3
      - 4
  - - consecutive sixths
    - - - 1
        - '6'
      - - 3
        - '6'
      - - 4
        - '6'
  - - veiled dominant
    - - 4
      - - 3
        - '6'
      - 1
  - - common tones
    - - 1
      - 3
      - 6
sources:
- work: Kitson, Elementary Harmony, Part I (Oxford University Press, 1920)
  pages: 98-100
  url: https://archive.org/details/elementaryharmon01kits
  note: The mediant triad in the major key, ch. XIV

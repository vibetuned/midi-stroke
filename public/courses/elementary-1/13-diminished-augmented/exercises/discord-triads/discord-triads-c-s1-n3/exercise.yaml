id: discord-triads-c-s1-n3
type: discord-triads
title: The discord triads in C major
instructions: Write each cell. The diminished fifth over the bass must already stand
  in the same part in the chord before (preparation), must fall one step into the
  chord after (resolution), and is never doubled. The augmented fifth — the leading
  note itself — is prepared the same way and rises.

id: six-four-ways-c-s1-n3
type: six-four-ways
title: The six-four's other uses in C major
instructions: 'Realize each cell. Passing: the six-four stands between two positions
  of one chord, the soprano taking the bass''s notes in reverse order. Auxiliary:
  the bass holds while the sixth and fourth wave above it. Arpeggio: the bass walks
  its own chord. Use the six-four sparingly — it must always account for itself.'
key: C
seed: 1
params:
  items: 3
  ways:

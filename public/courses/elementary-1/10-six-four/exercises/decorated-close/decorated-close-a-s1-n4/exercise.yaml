id: decorated-close-a-s1-n4
type: decorated-close
title: Closes decorated by the six-four in A minor
instructions: 'Write each close with its cadential six-four. The six-four stands on
  the tonic or dominant bass only, more strongly accented than the chord that resolves
  it: the sixth falls to the fifth, the fourth to the third, and the bass note is
  doubled in both chords.'
key: a
seed: 1
params:
  items: 4
  picks:
  - - 'false'
    - - 4
      - - 1
        - 6/4
      - 5
      - 6
  - - perfect
    - - - 2
        - '6'
      - - 1
        - 6/4
      - 5
      - 1
  - - half
    - - 1
      - - 1
        - 6/4
      - 5
  - - plagal
    - - 4
      - - 4
        - 6/4
      - 1
sources:
- work: Kitson, Elementary Harmony, Part I (Oxford University Press, 1920)
  pages: 73-76
  url: https://archive.org/details/elementaryharmon01kits
  note: The cadential six-four, ch. X §3

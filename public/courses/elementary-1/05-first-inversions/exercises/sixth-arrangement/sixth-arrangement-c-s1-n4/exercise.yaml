id: sixth-arrangement-c-s1-n4
type: sixth-arrangement
title: Arrange the first inversions in C major
instructions: 'Each given bass note is the THIRD of its chord — the figure 6 beneath
  a bass means a first inversion (6/3). Add soprano, alto, and tenor two different
  ways: complete the chord and double the root or the fifth (never the leading note).'
key: C
seed: 1
params:
  items: 4
  degrees:
  - 2
  - 6
  - 1
  - 4
sources:
- work: Kitson, Elementary Harmony, Part I (Oxford University Press, 1920)
  pages: 39-43
  url: https://archive.org/details/elementaryharmon01kits
  note: First inversions and their figuring, ch. V §§1-5

id: enharmonic-diminished-g-s1-n3
type: enharmonic-diminished
title: The enharmonic diminished seventh from G major
instructions: 'The same diminished-seventh SOUND serves several keys: it is the dominant
  minor ninth with its root omitted, and any of its four tones can be re-read as the
  third, fifth, seventh, or ninth of a new dominant. Resolve the given chord in each
  key named, writing it in the notation of the key approached.'
key: G
seed: 1
params:
  items: 3
  targets:
  - G
  - e
  - c#
sources:
- work: Kitson, Elementary Harmony, Part II (Oxford University Press, 1920)
  pages: 68-69
  url: https://archive.org/details/elementaryharmon02kits

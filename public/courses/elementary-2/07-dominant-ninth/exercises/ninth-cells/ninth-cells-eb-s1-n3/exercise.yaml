id: ninth-cells-eb-s1-n3
type: ninth-cells
title: The dominant ninth in Eb major
instructions: 'Treat the ninth three ways. Prepared and resolving over the sustained
  dominant, it is a suspension; unprepared, an appoggiatura — in both, the root may
  sound against it only in the bass. As the TRUE chord of the ninth it resolves one
  step down onto new harmony: the fifth stays out in four parts, the major ninth sounds
  above the third, and no two parts run from a ninth to an octave.'
key: E-
seed: 1
params:
  items: 3
  plans:
  - - appoggiatura
    - C5
  - - true ninth
  - - suspended
    - C5
sources:
- work: Kitson, Elementary Harmony, Part II (Oxford University Press, 1920)
  pages: 65-71
  url: https://archive.org/details/elementaryharmon02kits
  note: The chord of the dominant ninth, ch. VII §§1-6

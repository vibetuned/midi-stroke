id: thirteenth-cells-e-s1-n3
type: thirteenth-cells
title: The dominant thirteenth in E minor
instructions: 'The outer chords are given; write the dominant thirteenth between them.
  Four parts: root, third, seventh, thirteenth — the thirteenth stands in for the
  fifth and must sound above the seventh. Its exits: fall one step to the fifth while
  the dominant stands; leap down direct to the tonic root (the true chord); or hold
  as a common tone of the chord that follows. A true dominant discord always carries
  its seventh.'
key: e
seed: 1
params:
  items: 3
  plans:
  - - true thirteenth
  - - common tone
  - - decorative
sources:

id: suspension-cells-a-s1-n5
type: suspension-cells
title: Prepare and resolve the suspensions in A minor
instructions: 'Each pair of chords is given plain; the marked voice falls (or, in
  the 7-8, rises a semitone) between them. Re-write the second measure, retarding
  that voice: the old tone strikes WITH the new chord on the strong half and resolves
  on the weak. The discord must be prepared, must be more strongly accented than its
  resolution, and must not sound against the resolution note unless that note is in
  the bass.'
key: a
seed: 1
params:
  items: 5
  plans:
  - - 6 5
    - - 1
      - 5
    - C5
  - - 7 6
    - - 2
      - - 1
        - '6'
    - B4
  - - 7 8 rising
    - - 5
      - 1
    - G#4
  - - 9 8
    - - - 5
        - '6'
      - 1
    - B4
  - - 4 3
    - - 4
      - 1
    - D5
sources:
- work: Kitson, Elementary Harmony, Part II (Oxford University Press, 1920)
  pages: 53-56
  url: https://archive.org/details/elementaryharmon02kits
  note: Suspensions, ch. VI §§1-7, 11, and Exercises (1)-(2)

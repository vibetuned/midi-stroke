id: bass-suspension-g-s1-n2
type: bass-suspension
title: Bass suspensions in G major
instructions: The bass falls one step between the chords. Re-write the second measure,
  holding the old bass under the new upper parts — they must figure 5/2 (or 4/2) above
  it, and none of them may sound the bass's note of resolution — then let the bass
  make its step.
key: G
seed: 1
params:
  items: 2
  plans:
  - - 5/2
    - - 4
      - - 1
        - '6'
    - C3
  - - 5/2
    - - 1
      - - 5
        - '6'
    - G3
sources:
- work: Kitson, Elementary Harmony, Part II (Oxford University Press, 1920)
  pages: '55'
  url: https://archive.org/details/elementaryharmon02kits
  note: Bass suspensions, ch. VI §9

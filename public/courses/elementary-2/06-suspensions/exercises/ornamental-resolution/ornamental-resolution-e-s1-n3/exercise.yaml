id: ornamental-resolution-e-s1-n3
type: ornamental-resolution
title: Ornamental resolutions in E minor
instructions: 'Each second measure carries a 9-8 suspension. Resolve it ornamentally
  as named: leap or step to another factor of the chord before falling; touch the
  lower auxiliary first; or sound the resolution, dip below it, and settle. The harmony
  holds throughout the ornament.'
key: e
seed: 1
params:
  items: 3
  plans:
  - - lower auxiliary
    - F#4
    - D#4
  - - filled
    - F#5
    - D#5
  - - to another factor
    - F#4
    - G4
sources:
- work: Kitson, Elementary Harmony, Part II (Oxford University Press, 1920)
  pages: 57-58
  url: https://archive.org/details/elementaryharmon02kits
  note: Ornamental resolutions, ch. VI §12, and Exercises (4)

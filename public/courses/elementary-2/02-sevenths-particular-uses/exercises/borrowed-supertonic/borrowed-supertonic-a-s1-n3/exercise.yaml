id: borrowed-supertonic-a-s1-n3
type: borrowed-supertonic
title: The borrowed supertonic seventh in A major
instructions: 'Write each cadence using II7 of the minor key inside the major: the
  supertonic seventh with the flattened sixth degree (a chromatic tone on loan). Prepare
  its seventh as usual and let it fall to the leading note — or hold it through the
  cadential six-four. Keep the borrowed tone out of the neighbouring chords.'
key: A
seed: 1
params:
  items: 3
  picks:
  - - through the six-four
    - - 1
      - bii7
      - - 1
        - 6/4
      - 5
      - 1
  - - first inversion
    - - 1
      - bii6/5
      - 5
      - 1
  - - perfect
    - - 1
      - bii7
      - 5
      - 1
sources:
- work: Kitson, Elementary Harmony, Part II (Oxford University Press, 1920)
  pages: '10'
  url: https://archive.org/details/elementaryharmon02kits
  note: II7 of the minor key in the major key, ch. I §10

id: added-sixth-close-c-s1-n4
type: added-sixth-close
title: The chord of the added sixth in C major
instructions: Write each close for four voices. The supertonic seventh in first inversion
  is heard as the subdominant chord with a sixth added above the bass; it resolves
  directly to the tonic, and the seventh — for once — does not fall. It may enter
  unprepared.

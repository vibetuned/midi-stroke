id: seventh-context-a-s1-n3
type: seventh-context
title: Precede and follow the sevenths in A minor
instructions: 'Each middle chord is given complete. Write a chord before it and a
  chord after it in the same key: the approach prepares the seventh (or lawfully takes
  it free, for the particular uses of ch. II), and the resolution receives the falling
  discord. The answer shows one good way; others exist.'
key: a
seed: 1
params:
  items: 3
  plans:
  - - 5
    - - 6
      - '7'
    - - 5
      - '7'
  - - 1
    - dim7
    - 1
  - - 6
    - - 2
      - '7'
    - 5
sources:
- work: Kitson, Elementary Harmony, Part II (Oxford University Press, 1920)
  pages: 21-22
  url: https://archive.org/details/elementaryharmon02kits
  note: 'Exercises (2): write chords to precede and follow the given chords; cf. ch.
    I Exercises (6)'

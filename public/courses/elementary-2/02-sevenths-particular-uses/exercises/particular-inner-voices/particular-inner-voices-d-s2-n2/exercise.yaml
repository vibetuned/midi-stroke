id: particular-inner-voices-d-s2-n2
type: particular-inner-voices
title: Add the inner parts (particular uses) in D major
instructions: 'Soprano and bass are given; add alto and tenor. The phrases lean on
  the particular uses: the added sixth, IV7 into V, VI7 into the dominant seventh,
  the leading and diminished sevenths. These sevenths may enter unprepared — but each
  still falls (the added sixth alone stands still), and the bass quits each by step.'

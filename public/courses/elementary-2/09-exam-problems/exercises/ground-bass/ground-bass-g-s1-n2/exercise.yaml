id: ground-bass-g-s1-n2
type: ground-bass
title: A ground bass in G major
instructions: The ground is stated alone, then repeats unchanged beneath each variation.
  Harmonize the second statement in plain chords; in the third, feature a suspension
  at the cadence. Kitson's fuller plan adds a final statement of passing and auxiliary
  notes — the bass never changes.
key: G
seed: 1

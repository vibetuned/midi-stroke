id: there-and-back-f-s1-n2
type: there-and-back
title: Out and home again from F major
instructions: 'Write each sentence in seven chords: out to the named key through a
  pivot, confirm it — then back through a second pivot to a full close at home. Both
  pivots wear their double names; every seam keeps its chromatic alterations in one
  voice.'

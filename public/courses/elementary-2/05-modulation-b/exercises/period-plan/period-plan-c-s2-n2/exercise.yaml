id: period-plan-c-s2-n2
type: period-plan
title: Plan a sixteen-bar period in C major
instructions: 'Compose a 16-bar period (two 8-bar sentences) to the scheme given:
  establish the tonic through the first phrase; end the second with a full close in
  the key named (never the flat side); let the third phrase visit the flat-side keys,
  ideally as two sequential sub-sections; and bring the fourth phrase home gradually.
  The answer shows each phrase''s closing cadence as a signpost — the bars between
  are yours.'
key: C
seed: 2
params:
  items: 2
  schemes:
  - - C
    - G
    - - d
      - F
    - C
  - - C
    - G
    - - d
      - F
    - C
sources:

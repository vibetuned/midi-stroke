id: transition-f-s1-n4
type: transition
title: Transitions from F major
instructions: 'Write each transition in three chords: the old tonic set directly against
  the new key''s dominant seventh — no common chord between them, only a common note
  kept in its part — then the new tonic. Chromatic alterations stay in one voice.
  Transitions serve mid-phrase; never at the end of a normal phrase.'
key: F
seed: 1
params:
  items: 4
  plans:

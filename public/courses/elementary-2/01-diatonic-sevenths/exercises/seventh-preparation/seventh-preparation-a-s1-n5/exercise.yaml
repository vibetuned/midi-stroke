      - - 6
        - '7'
      - - 2
        - '6'
  - - first inversion
    - - 1
      - - 2
        - 6/5
      - 5
  - - through the six-four
    - - 1
      - - 2
        - '7'
      - - 1
        - 6/4
      - 5
  - - iiø7 to V
    - - 1
      - - 2
        - '7'
      - 5
  - - iiø7 to V
    - - 4
      - - 2
        - '7'
      - 5
sources:

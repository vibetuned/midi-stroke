id: seventh-preparation-a-s1-n5
type: seventh-preparation
title: Prepare and resolve the diatonic sevenths in A minor
instructions: Write each cell for four voices. The seventh must already stand in the
  same part in the chord before (preparation) and must fall one step into a chord
  of which that note is the third — the roots fall a fifth. Before a cadential six-four
  the seventh may hold over as the fourth from the bass and fall afterwards.
key: a
seed: 1

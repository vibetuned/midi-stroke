id: seventh-inner-voices-d-s1-n2
type: seventh-inner-voices
title: Add the inner parts (with diatonic sevenths) in D minor
instructions: 'Soprano and bass are given; add alto and tenor. Every chord marked
  with a 7 is a diatonic seventh: prepare the seventh in the same part, and let it
  fall one step onto the third of the next chord (or hold it through the cadential
  six-four). The Part I connection rules all hold.'
key: d
seed: 1
params:
  items: 2
  plans:
  - - 1
    - - 6
      - '7'
    - - 2
      - '6'
    - 5
    - 1
  - - 1
    - 4
    - - 2
      - '7'
    - 5
    - 1
sources:
- work: Kitson, Elementary Harmony, Part II (Oxford University Press, 1920)
  pages: 11-16
  url: https://archive.org/details/elementaryharmon02kits
  note: 'Exercises (1): add parts for A. and T.'

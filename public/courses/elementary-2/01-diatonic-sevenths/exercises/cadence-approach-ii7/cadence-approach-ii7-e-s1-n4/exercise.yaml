      - - 2
        - '7'
      - 5
      - 6
  - - perfect
    - - 4
      - - 2
        - '7'
      - 5
      - 1
  - - imperfect
    - - 1
      - - 2
        - '7'
      - 5
  - - through the six-four
    - - 1
      - - 2
        - '7'
      - - 1
        - 6/4
      - 5
      - 1

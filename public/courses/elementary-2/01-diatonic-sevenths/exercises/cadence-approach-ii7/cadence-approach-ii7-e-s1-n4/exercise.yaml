id: cadence-approach-ii7-e-s1-n4
type: cadence-approach-ii7
title: Cadences approached through II7 in E minor
instructions: Write each formula for four voices. The supertonic seventh is prepared
  by the chord before it; its seventh falls to the leading note at the dominant chord
  — or holds through the cadential six-four as the fourth from the bass, falling after.
  All the Part I cadence habits stand.
key: e
seed: 1

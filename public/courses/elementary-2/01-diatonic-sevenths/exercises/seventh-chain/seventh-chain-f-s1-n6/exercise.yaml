id: seventh-chain-f-s1-n6
type: seventh-chain
title: Continue the chain of sevenths in F major
instructions: The first two chords give the pattern; continue the sequence to the
  end. The roots fall in fifths, the third of each chord remains in its part to become
  the seventh of the next, and every seventh falls one step onto the third of the
  chord after. Complete and incomplete chords alternate; a leading note doubled by
  the repetition of the pattern is allowable.
key: F
seed: 1
params:
  items: 6
  plan:
  - 1
  - - 4
    - '7'
  - - 7
    - '7'
  - - 3
    - '7'
  - - 6
    - '7'
  - - 2
    - '7'
  - - 5
    - '7'
  - 1
sources:
- work: Kitson, Elementary Harmony, Part II (Oxford University Press, 1920)
  pages: 7-8
  url: https://archive.org/details/elementaryharmon02kits
  note: Chains of sevenths in sequence, ch. I §3, and Exercises (4), (8)

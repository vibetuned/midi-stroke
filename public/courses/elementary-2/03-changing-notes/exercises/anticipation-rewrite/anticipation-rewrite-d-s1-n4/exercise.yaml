id: anticipation-rewrite-d-s1-n4
type: anticipation-rewrite
title: Anticipations in D minor
instructions: The soprano moves by step between the chords. Re-write each pair, sounding
  the coming tone early on the last quarter of the first measure — the anticipation.
  It belongs in the top part, and no other harmony note is struck with it.
key: d
seed: 1
params:
  items: 4
  plans:

id: chromatic-passing-bb-s1-n3
type: chromatic-passing
title: Chromatic passing notes in Bb major
instructions: 'The soprano rises a whole tone between the chords. Re-write each pair,
  filling the step with a chromatic passing note on the weak half: once introduced,
  the part proceeds in semitones until it reaches a harmony note. Keep clear of the
  semitone below a chord''s major third — it shadows the minor third.'
key: B-
seed: 1
params:
  items: 3
  plans:
  - - - 1
      - 5
    - B4
  - - - 4
      - 5
    - G#4
  - - - 1
      - 4
    - F#4
sources:
- work: Kitson, Elementary Harmony, Part II (Oxford University Press, 1920)
  pages: 28-29
  url: https://archive.org/details/elementaryharmon02kits
  note: Chromatic passing notes, ch. III §§11-13
